    <div class="container">
        <div class="row" > 
          <div class="col-3" >          
          <div class="borda p-3 bg-light" style="width: 280px; height: 490px;  margin: 2.5rem -48px;" >
            <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-dark text-decoration-none">
              <img class="mb-0" src="{% static 'img/C2.png' %}" width="65" height="65" style="vertical-align:middle;margin:0px 80px">
            </a>
            <ul class="nav nav-pills flex-column mb-auto">
              <hr>
              <li class="nav-item">
                <a href="http://127.0.0.1:8000/index" class="nav-link link-dark" aria-current="page">
                  <svg class="bi me-2" width="16" height="16"><use xlink:href="#plan"/></svg>
                  Home
                </a>
              </li>
              <hr>
              <li>
                <a href="map" class="nav-link link-dark">
                  <svg class="bi me-2" width="16" height="16"><use xlink:href="#mark"/></svg>
                  Monitoramento
                </a>
              </li>
              <hr>
              <li>
                <a href="interest" target="_blank" class="nav-link link-dark">
                  <svg class="bi me-2" width="16" height="16"><use xlink:href="#mission"/></svg>
                  Área de Interesse
                </a>
              </li>
                <hr>          
                <li>
                  <a href="chat" class="nav-link link-dark">
                    <svg class="bi me-2" width="16" height="16"><use xlink:href="#chat"/></svg>
                    Chat
                  </a>
                </li>
                <hr>
                <li>
                  <a href="http://127.0.0.1:8000/admin" target="_blank" class="nav-link link-dark">
                    <svg class="bi me-2" width="16" height="16"><use xlink:href="#check"/></svg>
                    Admin
                  </a>
                <hr>
                </li>
                </ul>
            </div>
            </div>                    
                 
            
            <div class="col-9 flex-column"  style="height: 490px;" id="map" >
                {% block content %}
                {% endblock content %}              
            </div>
        
    </div>
</div>
